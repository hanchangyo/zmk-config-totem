# Pointing + trackpoint enabled only on the left (central) half.
CONFIG_ZMK_POINTING=y

CONFIG_I2C=y

# Out-of-tree ATTiny trackpoint driver (auto-enabled when the DT node is present,
# but keep it explicit here for clarity).
CONFIG_INPUT_TRACKPOINT=y

# Y inversion is the default, flip these to change axis handling.
# CONFIG_INPUT_TRACKPOINT_INVERT_X=n
# CONFIG_INPUT_TRACKPOINT_INVERT_Y=y
# CONFIG_INPUT_TRACKPOINT_SWAP_XY=n
