# Pointing + trackpoint enabled only on the right (central) half.
CONFIG_ZMK_POINTING=y

CONFIG_I2C=y

# Out-of-tree ATTiny trackpoint driver (auto-enabled when the DT node is present,
# but keep it explicit here for clarity).
CONFIG_INPUT_TRACKPOINT=y

# Y inversion is the default, flip these to change axis handling.
# CONFIG_INPUT_TRACKPOINT_INVERT_X=n
# CONFIG_INPUT_TRACKPOINT_INVERT_Y=y
# CONFIG_INPUT_TRACKPOINT_SWAP_XY=n

# --- Debug logging over USB CDC ACM ---
# Plug the RIGHT half in via USB and open its serial device (e.g.
# `screen /dev/cu.usbmodem* 115200` on macOS) to watch trackpoint events.
# The seeeduino_xiao_ble board conf in ZMK hard-disables SERIAL/CONSOLE/
# UART_CONSOLE/UART_INTERRUPT_DRIVEN to save power; we have to flip them
# back on here because totem_right.conf is merged after the board conf.
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_UART_INTERRUPT_DRIVEN=y
CONFIG_ZMK_USB_LOGGING=y
CONFIG_INPUT_TRACKPOINT_LOG_LEVEL=3
