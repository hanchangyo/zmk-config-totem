description: ATTiny I2C TrackPoint pointer

compatible: "zmk,input-trackpoint"

include: i2c-device.yaml

properties:
  poll-period-ms:
    type: int
    default: 8
    description: Poll period (ms) while the trackpoint is actively moving.

  idle-poll-period-ms:
    type: int
    default: 125
    description: Poll period (ms) when the trackpoint is idle.

  idle-timeout-ms:
    type: int
    default: 1500
    description: After this many ms without motion, revert from active to idle poll rate.

  dead-zone:
    type: int
    default: 30
    description: |
      Raw dx/dy samples within +/- this range are treated as no-motion and
      also used to adaptively learn the zero-motion baseline.

  sensitivity-shift:
    type: int
    default: 3
    description: |
      Right-shift applied to the compensated dx/dy before reporting.
      0 = raw (very fast), 1 = /2, 2 = /4, 3 = /8, ... Larger values
      produce slower, finer cursor motion. Fractional remainders are
      carried across polls so slow drags still move pixel-by-pixel.
