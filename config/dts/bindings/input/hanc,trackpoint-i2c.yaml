description: |
  Custom I2C trackpoint bridge where an ATtiny co-processor exposes
  10-byte polled reports (seq, dx, dy, x, y, buttons). Ported from the
  standalone xiao nrf52840 trackpoint reader project.

compatible: "hanc,trackpoint-i2c"

include: [i2c-device.yaml]

properties:
  poll-interval-idle-ms:
    type: int
    default: 125
    description: Polling period when the pointer is idle.

  poll-interval-active-ms:
    type: int
    default: 5
    description: Polling period when the pointer is actively moving.

  idle-timeout-ms:
    type: int
    default: 1500
    description: |
      Time without detected motion after which the driver returns to the
      idle polling rate.

  dead-zone:
    type: int
    default: 20
    description: |
      Magnitude below which compensated dx/dy are treated as zero. Also
      used as the gate for baseline drift learning while idle.

  max-speed:
    type: int
    default: 64
    description: |
      Per-sample clamp applied to dx and dy after compensation. Prevents
      a single spurious large sample from warping the cursor.

  invert-x:
    type: boolean
    description: Invert the reported X axis.

  invert-y:
    type: boolean
    description: Invert the reported Y axis.

  seed-samples:
    type: int
    default: 128
    description: |
      Number of initial samples averaged at boot to seed the baseline
      offset. Seeding runs at the active poll rate and emits no motion,
      so total boot-to-ready delay is roughly
      seed-samples * poll-interval-active-ms. When seeding finishes the
      driver drops straight to the idle poll rate. Keep the pointer
      untouched during this window so the baseline lands at the true
      rest point.
