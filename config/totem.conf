CONFIG_ZMK_USB_LOGGING=n
# Pointing is enabled per-shield; see config/boards/shields/totem/totem_right.conf
# (the right half hosts the trackpoint and is the split central).

CONFIG_BT_BAS=y
CONFIG_ZMK_BATTERY_REPORTING=y

# For split keyboards:
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y

# --- BLE connection-interval tuning for low-latency pointing ---
# Default ZMK values are MIN=6 (7.5 ms), MAX=12 (15 ms), LATENCY=30,
# which is fine for a plain keyboard but causes visible stutter on a
# trackpoint: the negotiated CI on most hosts ends up at 15 ms, and
# the slave-latency=30 means the peripheral can sleep through ~450 ms
# of connection events before it has to wake. Even though queued data
# does technically wake the radio earlier, in practice it does not
# always do so on every event, so motion samples accumulate and arrive
# in bursts every CI cycle = "skipping" cursor.
#
# Pin the CI to the BLE minimum (7.5 ms) and disable slave latency
# entirely so every connection event is used for sending. This trades
# some idle battery life for steady cursor motion.
#
# Units: 1.25 ms per step. So 6 = 7.5 ms, 12 = 15 ms, 24 = 30 ms.
# TIMEOUT is supervision timeout in 10 ms units (400 = 4 s).
#
# Note these are PREFERENCES — the host OS gets the final say. macOS
# usually accepts 7.5 ms; Windows often holds out at 11.25 / 15 ms;
# Linux is the most permissive. If the host insists on a longer CI,
# also consider raising poll-period-ms in totem_right.overlay so the
# trackpoint cadence matches whatever the host actually negotiates.
CONFIG_BT_PERIPHERAL_PREF_MIN_INT=6
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=6
# disable automatic connection parameter updates (Nordic recommends this for HID devices)
CONFIG_BT_GAP_AUTO_UPDATE_CONN_PARAMS=n
# increase the report queue size
CONFIG_ZMK_BLE_MOUSE_REPORT_QUEUE_SIZE=20
