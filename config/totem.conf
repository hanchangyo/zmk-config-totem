CONFIG_ZMK_USB_LOGGING=n
# Pointing is enabled per-shield; see config/boards/shields/totem/totem_left.conf.

# --- TEMPORARY: BLE fully OFF for hardware noise investigation ---
# Silence the 2.4 GHz radio entirely so we can tell whether BLE TX
# bursts are what glitch the ATTiny's ADC supply. USB is the only
# transport in this build; keys will not reach a host, which is fine
# because the HID listener is also disabled in totem_left.overlay and
# the trackpoint driver is in raw-debug mode. Revert this block (and
# restore the BT_BAS / split-BLE battery options below) to go back to
# a normal wireless build.
CONFIG_BT=n
CONFIG_ZMK_BLE=n
CONFIG_ZMK_SPLIT=n
CONFIG_ZMK_USB=y

# Battery / split-BLE helpers depend on BT; must be off to match.
CONFIG_BT_BAS=n
CONFIG_ZMK_BATTERY_REPORTING=n
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=n
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=n
